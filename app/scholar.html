<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Samsara Scholar — L5 prototype</title>
<style>
  :root {
    --bg:#0b0a08; --bg-2:#14110c; --ink:#efe4c9; --dim:#b9ac8c;
    --gold:#d4a94a; --gold-b:#f1c866; --rule:#3a2f1d; --accent:#c94a33;
    --serif: "Cormorant Garamond", "EB Garamond", Georgia, serif;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  html,body { margin:0; background: var(--bg); color: var(--ink);
    font-family: var(--serif); font-size: 17px; line-height: 1.55; min-height: 100vh; }
  header { padding: 28px 24px 20px; text-align: center; border-bottom: 1px solid var(--rule);
           position: relative; }
  h1 { font-weight: 500; letter-spacing: 0.35em; text-transform: uppercase; margin: 0;
       color: var(--gold-b); font-size: 24px; }
  h1 small { display: block; color: var(--dim); font-size: 11px; letter-spacing: 0.28em;
             margin-top: 6px; text-transform: uppercase; font-family: var(--sans); }
  .home-link { position: absolute; top: 28px; left: 24px;
    color: var(--gold); text-decoration: none; font-family: var(--sans);
    font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; }
  .home-link:hover { color: var(--gold-b); }

  main { max-width: 880px; margin: 0 auto; padding: 24px; }

  .ask-row { display: flex; gap: 10px; margin-bottom: 22px; }
  .ask-row input { flex: 1; padding: 12px 16px; border-radius: 6px;
    background: var(--bg-2); border: 1px solid var(--rule); color: var(--ink);
    font-family: var(--serif); font-size: 17px; }
  .ask-row input:focus { outline: 0; border-color: var(--gold); }
  button.primary { background: var(--gold); color: #1a1a0a; border: 0;
    padding: 12px 22px; font-family: var(--sans); font-size: 12px;
    letter-spacing: 0.22em; text-transform: uppercase; border-radius: 4px;
    cursor: pointer; font-weight: 600; }
  button.primary:hover:not([disabled]) { background: var(--gold-b); }
  button.primary[disabled] { opacity: 0.55; cursor: not-allowed; }

  .model-card { background: var(--bg-2); border: 1px solid var(--rule);
    padding: 14px 18px; border-radius: 8px; margin-bottom: 20px;
    display: flex; align-items: center; gap: 14px; font-size: 13px; color: var(--dim);
    flex-wrap: wrap; }
  .model-card .dot { width: 10px; height: 10px; border-radius: 50%;
    background: var(--rule); flex-shrink: 0; }
  .model-card.loaded .dot { background: #5fae5f; }
  .model-card button { margin-left: auto; background: transparent;
    border: 1px solid var(--rule); color: var(--gold); padding: 6px 12px;
    border-radius: 4px; cursor: pointer; font-family: var(--sans); font-size: 11px;
    letter-spacing: 0.2em; text-transform: uppercase; }
  .model-card button:hover { border-color: var(--gold); color: var(--gold-b); }
  .progress { height: 4px; background: var(--rule); border-radius: 2px;
    margin-top: 10px; overflow: hidden; flex-basis: 100%; display: none; }
  .progress.visible { display: block; }
  .progress-bar { height: 100%; background: var(--gold); width: 0%; transition: width 200ms; }

  .answer { background: var(--bg-2); border: 1px solid var(--rule);
    border-left: 2px solid var(--gold); padding: 18px 22px; border-radius: 6px;
    margin: 16px 0; line-height: 1.6; white-space: pre-wrap; }
  .answer:empty { display: none; }
  .answer .src {
    font-family: var(--sans); font-size: 10px; letter-spacing: 0.28em;
    text-transform: uppercase; color: var(--gold); margin-bottom: 10px; }

  .retrieved { margin-top: 6px; }
  .retrieved .label {
    font-family: var(--sans); font-size: 10px; letter-spacing: 0.28em;
    text-transform: uppercase; color: var(--gold); margin: 8px 0 10px; }
  .hit { background: var(--bg-2); border: 1px solid var(--rule);
    border-radius: 6px; padding: 14px 18px; margin-bottom: 10px; }
  .hit .hit-head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 6px; font-family: var(--sans); font-size: 11px;
    letter-spacing: 0.18em; text-transform: uppercase; }
  .hit .hit-source { color: var(--gold); }
  .hit .hit-page   { color: var(--dim); }
  .hit .hit-body { color: var(--ink); font-size: 15px; line-height: 1.55; }
  .hit .hit-title { font-family: var(--serif); font-weight: 500; color: var(--ink);
    font-size: 16px; margin-bottom: 6px; }

  .status { color: var(--dim); font-size: 13px; margin: 12px 0; font-style: italic; }
  footer { max-width: 880px; margin: 40px auto 20px; padding: 0 24px;
    font-family: var(--sans); font-size: 10px; letter-spacing: 0.22em;
    text-transform: uppercase; color: var(--dim); text-align: center; }

  .loading-spinner { display: inline-block; width: 10px; height: 10px;
    border: 2px solid var(--rule); border-top-color: var(--gold);
    border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <a class="home-link" href="/">← back to the wheel</a>
  <h1>Samsara Scholar<small>L5 prototype · in-browser search and Q&amp;A</small></h1>
</header>

<main>

  <div class="ask-row">
    <input id="q" placeholder="Ask the book — e.g. 'Who is the sage of the hell realms?'"
           autocomplete="off" />
    <button class="primary" id="ask">Ask</button>
  </div>

  <div class="model-card" id="model-card">
    <span class="dot"></span>
    <span id="model-status">Search-only mode. Load the scholar to get grounded answers.</span>
    <button id="load-btn">Load scholar</button>
    <div class="progress" id="progress"><div class="progress-bar" id="progress-bar"></div></div>
  </div>

  <div class="status" id="status"></div>
  <div class="answer" id="answer"></div>
  <div class="retrieved" id="retrieved"></div>

</main>

<footer>Samsara · a modern wheel of life · experimental</footer>

<script type="module">
const STATUS = document.getElementById("status");
const setStatus = (s) => { STATUS.textContent = s; };

setStatus("Building the index…");

const [book, contexts, glossarySrc] = await Promise.all([
  fetch("book.json").then(r => r.json()),
  fetch("contexts.json").then(r => r.json()),
  fetch("glossary.js").then(r => r.text()),
]);

const gloss = [];
for (const m of glossarySrc.matchAll(/"([^"]+)":\s*\{\n([^}]+?)\n\s+\},/gs)) {
  const term = m[1], blob = m[2];
  const pick = (k) => {
    const mm = blob.match(new RegExp(`\\b${k}:\\s*"((?:\\\\"|[^"])*)"`));
    return mm ? mm[1].replace(/\\"/g, '"').replace(/\\n/g, '\n') : null;
  };
  gloss.push({ term, short: pick("short"), body: pick("body"), page: pick("page") });
}

const docs = [];
for (const g of gloss) {
  docs.push({
    source: "glossary", title: g.term,
    text: `${g.short || ""} ${g.body || ""}`,
    page: g.page || "Glossary",
    full: `${g.term} — ${g.short || ""}\n\n${g.body || ""}`
  });
}
for (const [key, c] of Object.entries(contexts)) {
  const anchor = c.anchor || "";
  const page = c.page ? `p. ${c.page}` : "";
  const after = c.levels?.[0]?.after || "";
  docs.push({
    source: "passage", title: key,
    text: anchor + " " + after, page, full: anchor + " " + after
  });
}
for (const [pg, text] of Object.entries(book)) {
  docs.push({
    source: "book page", title: `p. ${pg}`, text,
    page: `p. ${pg}`, full: text.slice(0, 2000)
  });
}

const STOP = new Set("the a an and or of to in on at by for with is are was were be been being as that this it its i he she they we you or and but if then not no do does did will would can could may should".split(" "));
const tokenize = (s) =>
  (s.match(/[A-Za-zāīūḍṇṭṛṣśñçè’']{3,}/g) || [])
    .map(x => x.toLowerCase()).filter(x => !STOP.has(x));

const N = docs.length;
const dfs = new Map();
const docTokens = docs.map(d => {
  const t = tokenize(d.text);
  for (const w of new Set(t)) dfs.set(w, (dfs.get(w) || 0) + 1);
  return t;
});
const idf = new Map();
for (const [t, df] of dfs) idf.set(t, Math.log((N - df + 0.5) / (df + 0.5) + 1));

function retrieve(query, k = 4) {
  const qtoks = tokenize(query);
  const scores = docs.map((d, i) => {
    const toks = docTokens[i];
    const doclen = toks.length || 1;
    const tf = new Map();
    for (const t of toks) tf.set(t, (tf.get(t) || 0) + 1);
    let s = 0;
    for (const t of qtoks) {
      const n = tf.get(t) || 0;
      if (n > 0) s += (idf.get(t) || 0) * (n * 2.0) / (n + 1.2 * (1 - 0.75 + 0.75 * doclen / 400));
    }
    if (qtoks.some(w => d.title.toLowerCase().includes(w))) s += 2.0;
    return [s, i];
  });
  scores.sort((a, b) => b[0] - a[0]);
  return scores.slice(0, k).filter(([s]) => s > 0).map(([_, i]) => docs[i]);
}

setStatus(`Index ready — ${docs.length} passages searchable.`);

const qEl = document.getElementById("q");
const askBtn = document.getElementById("ask");
const answerEl = document.getElementById("answer");
const retrievedEl = document.getElementById("retrieved");

function escapeHTML(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function renderRetrieved(hits) {
  retrievedEl.innerHTML = `
    <div class="label">Retrieved · ${hits.length} passage${hits.length !== 1 ? "s" : ""}</div>
    ${hits.map(h => `
      <div class="hit">
        <div class="hit-head">
          <span class="hit-source">${h.source}</span>
          <span class="hit-page">${h.page}</span>
        </div>
        <div class="hit-title">${escapeHTML(h.title)}</div>
        <div class="hit-body">${escapeHTML(h.full.slice(0, 800))}${h.full.length > 800 ? "…" : ""}</div>
      </div>
    `).join("")}
  `;
}

let pipe = null;

async function ask() {
  const q = qEl.value.trim();
  if (!q) return;
  askBtn.disabled = true;
  answerEl.innerHTML = "";
  retrievedEl.innerHTML = "";
  setStatus("Searching the corpus…");

  const hits = retrieve(q, 4);
  renderRetrieved(hits);

  if (pipe) {
    setStatus("Generating grounded answer…");
    const context = hits.map(h => `[${h.source} · ${h.page}] ${h.title}\n${h.full.slice(0, 1200)}`).join("\n\n");
    const messages = [
      { role: "system", content:
        "You are a careful reader of The Tibetan Book of the Dead (trans. Gyurme Dorje & Graham Coleman, Penguin Classics). " +
        "Answer ONLY from the passages below. If the passages don't answer the question, say so. Cite a page." },
      { role: "user", content: `PASSAGES:\n${context}\n\nQUESTION: ${q}` },
    ];
    try {
      const result = await pipe(messages, { max_new_tokens: 240, do_sample: false });
      const text = result[0].generated_text.at(-1).content;
      answerEl.innerHTML = `<div class="src">Grounded answer</div>${escapeHTML(text)}`;
      setStatus("");
    } catch (e) {
      setStatus("Generation failed: " + e.message);
    }
  } else {
    setStatus("No model loaded — showing retrieved passages. Load the scholar for grounded answers.");
  }

  askBtn.disabled = false;
}
askBtn.onclick = ask;
qEl.addEventListener("keydown", e => { if (e.key === "Enter") ask(); });

const MODEL_ID = "thealch3m1st/samsara-qwen1.5b";
const loadBtn = document.getElementById("load-btn");
const modelCard = document.getElementById("model-card");
const modelStatus = document.getElementById("model-status");
const progressEl = document.getElementById("progress");
const progressBar = document.getElementById("progress-bar");

loadBtn.onclick = async () => {
  loadBtn.disabled = true;
  loadBtn.innerHTML = `<span class="loading-spinner"></span>Loading…`;
  modelStatus.textContent = "Loading Transformers.js…";
  progressEl.classList.add("visible");

  try {
    const { pipeline, env } = await import("https://cdn.jsdelivr.net/npm/@huggingface/transformers@3/dist/transformers.min.js");
    env.allowLocalModels = false;

    pipe = await pipeline("text-generation", MODEL_ID, {
      dtype: "q8", device: "webgpu",
      progress_callback: (ev) => {
        if (ev.status === "progress" && ev.loaded && ev.total) {
          const pct = Math.round(100 * ev.loaded / ev.total);
          progressBar.style.width = pct + "%";
          modelStatus.textContent = `Downloading ${ev.file || "model"} — ${pct}%`;
        }
      },
    });

    modelCard.classList.add("loaded");
    modelStatus.textContent = "Samsara scholar loaded — answers will be grounded in retrieved passages.";
    loadBtn.style.display = "none";
    progressEl.classList.remove("visible");
  } catch (e) {
    modelStatus.textContent = "Model not yet hosted on HF Hub — retrieval still works. Push via push_to_hub.sh on the Spark.";
    loadBtn.disabled = false;
    loadBtn.textContent = "Retry";
  }
};
</script>
</body>
</html>
